<!DOCTYPE html>
<html lang="sr-Latn-RS">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sendvič paneli</title>
    <meta
      name="description"
      content="Pozovite 060 07 05 045."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://steel-concept.com/" />
    <meta property="og:title" content="Sendvič paneli" />
    <meta property="og:description" content="Pozovite 060 07 05 045." />
    <meta
      property="og:image"
      content="https://steel-concept.com/assets/social-preview-isofrig.jpg"
    />
    <meta
      property="og:image:secure_url"
      content="https://steel-concept.com/assets/social-preview-isofrig.jpg"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="1080" />
    <meta property="og:image:alt" content="ISOFRIG LS sendvič panel" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sendvič paneli" />
    <meta name="twitter:description" content="Pozovite 060 07 05 045." />
    <meta name="twitter:image" content="https://steel-concept.com/assets/social-preview-isofrig.jpg" />
    <meta name="twitter:image:alt" content="ISOFRIG LS sendvič panel" />
    <meta name="theme-color" content="#f5f5f7" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='white'/%3E%3Crect x='14' y='30' width='36' height='4' rx='2' fill='%23111111'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="products-data.js"></script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#catalog">Pređi na katalog</a>

    <header class="site-header" data-header>
      <div class="container header-shell">
        <button
          class="filter-toggle"
          type="button"
          data-filter-toggle
          aria-expanded="false"
          aria-controls="filter-panel"
        >
          Filteri
        </button>

        <a class="brand" href="#top" aria-label="Steel Concept početna">
          <strong>STEEL CONCEPT</strong>
        </a>

        <div class="header-actions">
          <a class="header-link" href="tel:+381600705045">060 07 05 045</a>
          <a
            class="header-call"
            href="tel:+381600705045"
            aria-label="Pozovi Steel Concept"
          >
            <img src="assets/ringer-volume-icons8.png" alt="" />
          </a>
        </div>
      </div>
    </header>

    <main id="top">
      <section class="catalog" id="catalog">
        <div class="container catalog-shell">
          <div class="filter-backdrop" data-filter-backdrop hidden></div>

          <aside
            class="filters-panel"
            id="filter-panel"
            data-filter-panel
            aria-label="Filteri proizvoda"
          >
            <div class="filters-head">
              <div>
                <p class="filters-kicker">Filteri</p>
              </div>
              <button
                class="filters-close"
                type="button"
                data-filter-close
                aria-label="Zatvori filtere"
              >
                ×
              </button>
            </div>

            <div class="search-box">
              <label for="search">Pretraga proizvoda</label>
              <input
                id="search"
                type="search"
                placeholder="Naziv ili tip panela"
                data-search
              />
            </div>

            <form class="filters-form" data-filters-form>
              <fieldset class="filter-group">
                <legend>Tip panela</legend>
                <label><input type="checkbox" value="zidni" data-filter="type" /> Zidni paneli</label>
                <label><input type="checkbox" value="krovni" data-filter="type" /> Krovni paneli</label>
              </fieldset>

              <fieldset class="filter-group">
                <legend>Jezgro</legend>
                <label><input type="checkbox" value="PUR" data-filter="core" /> PUR</label>
                <label><input type="checkbox" value="PIR" data-filter="core" /> PIR</label>
                <label><input type="checkbox" value="Mineralna vuna" data-filter="core" /> Mineralna vuna</label>
              </fieldset>

              <fieldset class="filter-group">
                <legend>Spoj</legend>
                <label><input type="checkbox" value="Skriveni spoj" data-filter="fixation" /> Skriveni spoj</label>
                <label><input type="checkbox" value="Vidljivi spoj" data-filter="fixation" /> Vidljivi spoj</label>
                <label><input type="checkbox" value="Frigo spoj" data-filter="fixation" /> Frigo spoj</label>
              </fieldset>

              <fieldset class="filter-group">
                <legend>Primena</legend>
                <label><input type="checkbox" value="Industrijski / trgovački" data-filter="application" /> Industrijski / trgovački</label>
                <label><input type="checkbox" value="Stroge higijenske primene" data-filter="application" /> Stroge higijenske primene</label>
                <label><input type="checkbox" value="Rashladne komore" data-filter="application" /> Rashladne komore</label>
              </fieldset>

              <button class="clear-button" type="button" data-clear>
                Resetuj filtere
              </button>
            </form>
          </aside>

          <section class="results-panel" aria-label="Proizvodi">
            <div class="results-head">
              <div>
                <h2>Sendvič paneli</h2>
              </div>
              <div class="results-meta">
                <span data-count></span>
                <button class="results-clear" type="button" data-clear>
                  Resetuj
                </button>
              </div>
            </div>

            <div class="active-filters" data-active-filters></div>

            <div class="product-grid" data-product-grid></div>

            <div class="empty-state" data-empty hidden>
              <h3>Nema rezultata za izabrane filtere.</h3>
              <p>Probaj sa manje filtera ili resetuj pretragu.</p>
            </div>
          </section>
        </div>
      </section>

    </main>
  </body>
</html>
